<div id="addAdminModal"
    class="fixed inset-0 z-[70] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">

    <div id="addAdminCard" class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] shadow-2xl flex flex-col overflow-hidden
                transition-all duration-300 scale-95 opacity-0">

        <!-- Modal header -->
        <div class="bg-cmu-blue px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/15 rounded-xl flex items-center justify-center">
                    <i class="fas fa-user-shield text-white"></i>
                </div>
                <div>
                    <h3 class="text-white font-black text-base uppercase tracking-widest leading-none">
                        Add New Admin
                    </h3>
                    <p class="text-blue-200 text-[10px] mt-0.5 font-semibold uppercase tracking-wider">
                        SAO Management Portal
                    </p>
                </div>
            </div>
            <button onclick="closeAddAdminModal()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/10
                           text-white hover:bg-white/20 transition text-sm">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Alert banner (hidden by default) -->
        <div id="adminFormAlert" class="hidden px-8 py-3 text-sm font-semibold flex items-center gap-3">
        </div>

        <!-- Form body -->
        <form id="addAdminForm" class="px-8 py-6 space-y-5 overflow-y-auto custom-scrollbar flex-grow"
            onsubmit="submitAddAdmin(event)">

            <!-- Full name -->
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                    Full Name <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input type="text" name="full_name" required placeholder="e.g. Maria Santos" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200
                                  rounded-xl text-sm font-medium outline-none
                                  focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                </div>
            </div>

            <!-- Email + School number (2 col) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                        CMU Email <span class="text-red-400">*</span>
                    </label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                        <input type="email" name="cmu_email" required placeholder="user@cmu.edu.ph" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200
                                      rounded-xl text-sm font-medium outline-none
                                      focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                        School Number <span class="text-red-400">*</span>
                    </label>
                    <div class="relative">
                        <i class="fas fa-id-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                        <input type="text" name="school_number" required placeholder="e.g. 202500855" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200
                                      rounded-xl text-sm font-medium outline-none
                                      focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                    </div>
                </div>
            </div>

            <!-- Department -->
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                    Department / Office <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <i class="fas fa-building absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <select name="department" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200
                                   rounded-xl text-sm font-medium outline-none appearance-none
                                   focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                        <option value="">Select department</option>
                        <option value="Student Affairs Office">Student Affairs Office</option>
                        <option value="Office of the University Registrar">Office of the University Registrar</option>
                        <option value="Finance Office">Finance Office</option>
                        <option value="Office of the President">Office of the President</option>
                        <option value="Graduate Studies and Applied Research Office">Graduate Studies and Applied
                            Research Office</option>
                        <option value="College of Computer Studies">College of Computer Studies</option>
                        <option value="College of Teacher Education">College of Teacher Education</option>
                        <option value="College of Arts and Sciences">College of Arts and Sciences</option>
                        <option value="College of Business and Accountancy">College of Business and Accountancy</option>
                        <option value="College of Criminal Justice Education">College of Criminal Justice Education
                        </option>
                    </select>
                    <i
                        class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs pointer-events-none"></i>
                </div>
            </div>

            <!-- Phone number -->
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                    Phone Number <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">+63</span>
                    <input type="tel" name="phone_number" required placeholder="912 345 6789" class="w-full pl-14 pr-4 py-3 bg-slate-50 border border-slate-200
                                  rounded-xl text-sm font-medium outline-none
                                  focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                </div>
            </div>

            <!-- Password + Confirm (2 col) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                        Password <span class="text-red-400">*</span>
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                        <input type="password" name="password" id="adminPw" required placeholder="Min. 8 characters"
                            class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200
                                      rounded-xl text-sm font-medium outline-none
                                      focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                        <button type="button" tabindex="-1" onclick="togglePw('adminPw','eyeIcon1')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 transition">
                            <i id="eyeIcon1" class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">
                        Confirm Password <span class="text-red-400">*</span>
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                        <input type="password" name="confirm_password" id="adminPwConfirm" required
                            placeholder="Re-enter password" class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200
                                      rounded-xl text-sm font-medium outline-none
                                      focus:ring-2 focus:ring-cmu-blue focus:border-cmu-blue transition">
                        <button type="button" tabindex="-1" onclick="togglePw('adminPwConfirm','eyeIcon2')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 transition">
                            <i id="eyeIcon2" class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Password strength indicator -->
            <div id="pwStrengthWrap" class="hidden">
                <div class="flex gap-1 mb-1">
                    <div id="ps1" class="h-1 flex-1 rounded-full bg-slate-200 transition-all duration-300"></div>
                    <div id="ps2" class="h-1 flex-1 rounded-full bg-slate-200 transition-all duration-300"></div>
                    <div id="ps3" class="h-1 flex-1 rounded-full bg-slate-200 transition-all duration-300"></div>
                    <div id="ps4" class="h-1 flex-1 rounded-full bg-slate-200 transition-all duration-300"></div>
                </div>
                <p id="pwStrengthLabel" class="text-[10px] font-black uppercase"></p>
            </div>

            <!-- Permission note -->
            <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 flex gap-3">
                <i class="fas fa-triangle-exclamation text-amber-500 mt-0.5 flex-shrink-0 text-sm"></i>
                <p class="text-[11px] text-amber-700 leading-relaxed">
                    This account will have <strong>full admin access</strong> to the SAO Management Portal,
                    including the ability to manage matches, verify claims, and access the archive.
                    Only create accounts for authorized SAO personnel.
                </p>
            </div>

            <!-- Footer actions -->
            <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeAddAdminModal()" class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl
                               font-bold text-sm hover:bg-slate-50 transition">
                    Cancel
                </button>
                <button type="submit" id="addAdminSubmitBtn" class="flex-1 py-3 bg-cmu-blue text-white rounded-xl font-black text-sm
                               shadow-lg hover:bg-slate-800 active:scale-[0.98] transition-all
                               flex items-center justify-center gap-2">
                    <i class="fas fa-user-plus"></i>
                    Create Admin Account
                </button>
            </div>

        </form>
    </div>
</div>

<!-- ── Add Admin Scripts ──────────────────────────────────────────────────── -->
<script>
    // ── Modal open / close ────────────────────────────────────────────────────
    function openAddAdminModal() {
        const modal = document.getElementById('addAdminModal');
        const card = document.getElementById('addAdminCard');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
        requestAnimationFrame(() => {
            card.classList.remove('scale-95', 'opacity-0');
            card.classList.add('scale-100', 'opacity-100');
        });
    }

    function closeAddAdminModal() {
        const modal = document.getElementById('addAdminModal');
        const card = document.getElementById('addAdminCard');
        card.classList.remove('scale-100', 'opacity-100');
        card.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
            // Reset the form
            document.getElementById('addAdminForm').reset();
            hideAlert();
            resetPwStrength();
        }, 250);
    }

    // Close on backdrop click
    document.getElementById('addAdminModal').addEventListener('click', function (e) {
        if (e.target === this) closeAddAdminModal();
    });

    // Close on Escape
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('addAdminModal');
            if (!modal.classList.contains('hidden')) closeAddAdminModal();
        }
    });

    // ── Password visibility toggle ────────────────────────────────────────────
    function togglePw(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // ── Password strength meter ───────────────────────────────────────────────
    document.getElementById('adminPw').addEventListener('input', function () {
        const val = this.value;
        const wrap = document.getElementById('pwStrengthWrap');

        if (!val) { wrap.classList.add('hidden'); resetPwStrength(); return; }
        wrap.classList.remove('hidden');

        let strength = 0;
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        const colors = ['bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];
        const tColors = ['text-red-500', 'text-orange-500', 'text-yellow-500', 'text-green-600'];

        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById(`ps${i}`);
            bar.className = `h-1 flex-1 rounded-full transition-all duration-300 ${i <= strength ? colors[strength - 1] : 'bg-slate-200'
                }`;
        }

        const label = document.getElementById('pwStrengthLabel');
        label.textContent = labels[strength - 1] || '';
        label.className = `text-[10px] font-black uppercase ${tColors[strength - 1] || ''}`;
    });

    function resetPwStrength() {
        for (let i = 1; i <= 4; i++) {
            document.getElementById(`ps${i}`).className = 'h-1 flex-1 rounded-full bg-slate-200 transition-all duration-300';
        }
        const label = document.getElementById('pwStrengthLabel');
        label.textContent = '';
        document.getElementById('pwStrengthWrap').classList.add('hidden');
    }

    // ── Alert helpers ─────────────────────────────────────────────────────────
    function showAlert(message, type = 'error') {
        const el = document.getElementById('adminFormAlert');
        const styles = {
            error: 'bg-red-50 border-b border-red-100 text-red-700',
            success: 'bg-green-50 border-b border-green-100 text-green-700',
        };
        const icons = {
            error: 'fa-circle-exclamation',
            success: 'fa-circle-check',
        };
        el.className = `px-8 py-3 text-sm font-semibold flex items-center gap-3 ${styles[type]}`;
        el.innerHTML = `<i class="fas ${icons[type]} flex-shrink-0"></i> ${message}`;
        el.classList.remove('hidden');
    }

    function hideAlert() {
        document.getElementById('adminFormAlert').classList.add('hidden');
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    async function submitAddAdmin(e) {
        e.preventDefault();
        hideAlert();

        const btn = document.getElementById('addAdminSubmitBtn');
        const form = document.getElementById('addAdminForm');
        const data = Object.fromEntries(new FormData(form).entries());

        // Client-side password match check
        if (data.password !== data.confirm_password) {
            showAlert('Passwords do not match.'); return;
        }
        if (data.password.length < 8) {
            showAlert('Password must be at least 8 characters.'); return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating...`;

        try {
            const res = await fetch('add_admin.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const result = await res.json();

            if (result.success) {
                showAlert(result.message, 'success');
                form.reset();
                resetPwStrength();
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-user-plus"></i> Create Admin Account`;
                // Auto-close after 2 s
                setTimeout(closeAddAdminModal, 2200);
            } else {
                showAlert(result.message || 'Something went wrong.');
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-user-plus"></i> Create Admin Account`;
            }
        } catch (err) {
            showAlert('Network error. Please try again.');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-user-plus"></i> Create Admin Account`;
        }
    }
</script>
